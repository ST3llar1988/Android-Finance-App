name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Clean Project
        run: |
          cd LoanEligibilityIndiaAndroid
          gradle clean

      - name: Build APK
        run: |
          cd LoanEligibilityIndiaAndroid
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: LoanEligibilityIndiaAndroid/app/build/outputs/apk/debug/app-debug.apk
