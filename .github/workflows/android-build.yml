name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Move to project folder
        run: cd LoanEligibilityIndiaAndroid

      - name: Make gradlew executable
        run: chmod +x LoanEligibilityIndiaAndroid/gradlew

      - name: Build APK
        run: cd LoanEligibilityIndiaAndroid && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: LoanEligibilityIndiaAndroid/app/build/outputs/apk/debug/app-debug.apk
